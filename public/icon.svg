<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74d620" />
      <stop offset="100%" stop-color="#4ea00d" />
    </linearGradient>
    <linearGradient id="clocheGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffce00" />
      <stop offset="100%" stop-color="#ff8a00" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="6" dy="12" stdDeviation="8" flood-color="#2a6308" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />

  <g filter="url(#dropShadow)">
    <!-- Q Circle -->
    <path d="M256,70 C140,70 46,164 46,280 C46,396 140,490 256,490 C372,490 466,396 466,280 C466,164 372,70 256,70 Z M256,160 C322,160 376,214 376,280 C376,346 322,400 256,400 C190,400 136,346 136,280 C136,214 190,160 256,160 Z" fill="#ffffff" />
    
    <!-- Q Tail -->
    <rect x="280" y="280" width="90" height="220" rx="45" transform="rotate(-45 325 390)" fill="#ffffff" />
    
    <!-- Speed Lines -->
    <rect x="90" y="330" width="60" height="14" rx="7" fill="#ffffff" />
    <rect x="110" y="355" width="40" height="14" rx="7" fill="#ffffff" />
    <rect x="130" y="380" width="50" height="14" rx="7" fill="#ffffff" />
    
    <!-- Cloche Dome -->
    <path d="M 150 380 C 150 310, 270 310, 270 380 Z" fill="url(#clocheGrad)" />
    <!-- Cloche Handle -->
    <rect x="195" y="300" width="30" height="16" rx="8" fill="url(#clocheGrad)" />
    <!-- Cloche Base -->
    <rect x="140" y="380" width="140" height="16" rx="8" fill="url(#clocheGrad)" />
  </g>
</svg>
